<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lunar Tear — NieR Re[in]carnation Manager</title>
<style>
:root {
  --bg-cream:      #cfc7b0;
  --bg-cream-dark: #b8b099;
  --fg-dark:       #2c2922;
  --fg-mid:        #57523f;
  --accent:        #1a1814;
  --panel:         #d8d1bb;
  --panel-inv-bg:  #2c2922;
  --panel-inv-fg:  #d8d1bb;
  --danger:        #6b0a0a;
  --success:       #3a4d24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg-cream); color: var(--fg-dark);
  font-family: "Segoe UI", "Tahoma", "Verdana", sans-serif;
  font-size: 14px; line-height: 1.45;
}

/* Identical grid overlay to LB */
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none;
  background:
    repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0,0,0,.03) 3px, rgba(0,0,0,.03) 4px),
    repeating-linear-gradient(to right,  transparent 0, transparent 3px, rgba(0,0,0,.03) 3px, rgba(0,0,0,.03) 4px);
  z-index: 9999;
}

body { display: flex; flex-direction: column; }

/* ── Terminal bar — identical to LB ── */
.terminal-bar {
  background: var(--accent); color: var(--bg-cream);
  padding: 8px 24px; font-size: 11px; letter-spacing: .2em;
  text-transform: uppercase; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.terminal-bar .left { display: flex; gap: 24px; }
.terminal-bar .right { display: flex; gap: 14px; align-items: center; }

.badge {
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  padding: 2px 8px; text-transform: uppercase;
}
.badge.running  { background: var(--success); color: #a0d888; }
.badge.stopped  { background: var(--danger);  color: #d89090; }
.badge.starting { background: #4a3a08;         color: #d8b848; }

/* ── Primary nav — identical to LB ── */
nav.primary {
  display: flex; background: var(--accent);
  border-bottom: 4px double var(--accent);
  flex-shrink: 0; overflow-x: auto;
}
nav.primary button {
  color: var(--bg-cream); padding: 12px 22px;
  font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
  font-weight: 600; font-family: inherit; background: transparent;
  border: none; outline: none; cursor: pointer; white-space: nowrap;
  transition: background .12s, color .12s;
}
nav.primary button:hover { background: var(--bg-cream); color: var(--accent); }
nav.primary button.active { background: var(--bg-cream); color: var(--accent); }

/* ── Content area ── */
.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }

/* ── Server panel ── */
#panel-server { flex: 1; overflow-y: auto; padding: 32px 40px; display: flex; flex-direction: column; gap: 24px; }

/* ── Section headers — LB style ── */
.sh {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; margin-bottom: 8px;
}
.sh::before { content: '[  '; color: var(--fg-mid); font-weight: 400; }
.sh::after  { content: '  ]'; color: var(--fg-mid); font-weight: 400; }
.sh-line { flex: 1; height: 1px; background: var(--accent); opacity: .18; }

/* ── Panel box — LB style ── */
.pbox { border: 2px solid var(--accent); background: var(--panel); padding: 16px 20px; }

/* ── Form ── */
.frow { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.flbl { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--fg-mid); white-space: nowrap; }
.finput {
  background: var(--bg-cream); border: 1px solid var(--fg-mid);
  color: var(--fg-dark); font-family: inherit; font-size: 13px;
  padding: 5px 9px; outline: none;
}
.finput:focus { border-color: var(--accent); }

/* ── Buttons — LB style ── */
.btn {
  border: 2px solid var(--accent); cursor: pointer;
  font-family: inherit; font-size: 11px; font-weight: 700;
  padding: 7px 20px; text-transform: uppercase; letter-spacing: .1em;
  background: var(--panel-inv-bg); color: var(--panel-inv-fg);
  transition: opacity .12s;
}
.btn:hover:not(:disabled) { opacity: .82; }
.btn:disabled { opacity: .3; cursor: default; }
.btn-ghost { background: transparent; color: var(--fg-dark); border: 2px solid var(--fg-mid); }
.btn-ghost:hover:not(:disabled) { background: var(--bg-cream-dark); border-color: var(--accent); }
.btn-sm { padding: 4px 12px; font-size: 10px; }

.crow { display: flex; align-items: center; gap: 10px; }

/* ── Log boxes ── */
.log-wrap { display: flex; flex-direction: column; }
.log-box {
  overflow-y: auto; background: var(--panel-inv-bg); color: #a0c890;
  font-family: Consolas, monospace; font-size: 12px;
  padding: 10px 14px; border: 2px solid var(--accent);
  height: 220px;
}
.log-box.lb-color { color: #80b8c8; }
.log-box div { line-height: 1.55; white-space: pre-wrap; word-break: break-all; }

/* ── LB iframe ── */
#lb-frame { flex: 1; border: none; width: 100%; display: none; }

/* ── LB offline placeholder ── */
#lb-offline {
  flex: 1; display: none; align-items: center; justify-content: center;
}
#lb-offline.show { display: flex; }

/* ── Scrollbar ── */
::-webkit-scrollbar       { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-cream-dark); }
::-webkit-scrollbar-thumb { background: var(--fg-mid); }
</style>
</head>
<body>

<div class="terminal-bar">
  <div class="left">
    <span>YoRHa</span>
    <span>Bunker Terminal</span>
    <span>Lunar Tear</span>
  </div>
  <div class="right">
    <span id="lb-badge"  class="badge stopped">LB: Offline</span>
    <span id="srv-badge" class="badge stopped">Server: Stopped</span>
  </div>
</div>

<nav class="primary">
  <button class="active" onclick="goServer()">Server</button>
  <button onclick="goLB('/', 0)">Status</button>
  <button onclick="goLB('/users', 1)">Users</button>
  <button onclick="goLB('/backups', 2)">Save Data</button>
  <button onclick="goLB('/items', 3)">Item Editor</button>
  <button onclick="goLB('/costumes', 4)">Costume Editor</button>
  <button onclick="goLB('/weapons', 5)">Weapon Editor</button>
  <button onclick="goLB('/upgrades', 6)">Upgrade Manager</button>
  <button onclick="goLB('/memoirs', 7)">Memoir Editor</button>
</nav>

<div class="content">

  <!-- ── Server panel ── -->
  <div id="panel-server">

    <div>
      <div class="sh">Configuration<div class="sh-line"></div></div>
      <div class="pbox">
        <div class="frow">
          <span class="flbl">IP Host</span>
          <input id="cfg-host" class="finput" style="width:140px" value="192.168.1.36">
          <span class="flbl">HTTP Port</span>
          <input id="cfg-http" class="finput" style="width:72px" value="8080">
          <span class="flbl">gRPC Port</span>
          <input id="cfg-grpc" class="finput" style="width:72px" value="8003">
          <button class="btn btn-ghost btn-sm" onclick="saveConfig()">Save</button>
        </div>
      </div>
    </div>

    <div>
      <div class="sh">Server Controls<div class="sh-line"></div></div>
      <div class="pbox">
        <div class="crow">
          <button id="btn-srv-start" class="btn"       onclick="api('/api/server/start')">▶ Start Server</button>
          <button                    class="btn btn-ghost" onclick="api('/api/server/migrate')">⚙ Migrate DB</button>
          <button id="btn-srv-stop"  class="btn btn-ghost" disabled onclick="api('/api/server/stop')">■ Stop</button>
          <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="clearLog('server')">Clear</button>
        </div>
      </div>
    </div>

    <div class="log-wrap">
      <div class="sh">Server Output<div class="sh-line"></div></div>
      <div id="log-server" class="log-box"></div>
    </div>

    <div>
      <div class="sh">Lunar Base<div class="sh-line"></div></div>
      <div class="pbox">
        <div class="crow">
          <button id="btn-lb-start" class="btn"       onclick="api('/api/lb/start')">▶ Iniciar Lunar Base</button>
          <button id="btn-lb-stop"  class="btn btn-ghost" disabled onclick="api('/api/lb/stop')">■ Detener</button>
          <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="clearLog('lb')">Clear</button>
        </div>
      </div>
    </div>

    <div class="log-wrap">
      <div class="sh">Lunar Base Output<div class="sh-line"></div></div>
      <div id="log-lb" class="log-box lb-color"></div>
    </div>

    <footer style="margin-top:40px;margin-left:-40px;margin-right:-40px;padding:24px 40px;text-align:center;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--fg-mid);border-top:4px double var(--accent)">End of transmission // Glory to mankind</footer>

  </div>

  <!-- ── LB iframe ── -->
  <iframe id="lb-frame" src=""></iframe>

  <!-- ── LB offline ── -->
  <div id="lb-offline">
    <div class="pbox" style="text-align:center;max-width:480px">
      <p style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-mid);margin-bottom:10px">[ Lunar Base Offline ]</p>
      <p style="margin-bottom:16px">Iniciá Lunar Base desde la pestaña Server primero.</p>
      <button class="btn" onclick="goServer()">← Volver a Server</button>
    </div>
  </div>

</div>

<script>
let srvIdx = 0, lbIdx = 0;
let cfgLoaded = false;
let lbRunning = false;
let activeTab = 'server';
let activeLBPath = '/';
const LB = 8888;

const navBtns = document.querySelectorAll('nav.primary button');

function setNav(idx) {
  navBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
}

function goServer() {
  activeTab = 'server';
  setNav(0);
  document.getElementById('panel-server').style.display = '';
  document.getElementById('lb-frame').style.display     = 'none';
  document.getElementById('lb-offline').className       = '';
}

function goLB(path, idx) {
  activeTab = 'lb';
  activeLBPath = path;
  setNav(idx + 1);
  document.getElementById('panel-server').style.display = 'none';

  if (lbRunning) {
    const f = document.getElementById('lb-frame');
    f.src = `http://127.0.0.1:${LB}${path}`;
    f.style.display = 'block';
    document.getElementById('lb-offline').className = '';
  } else {
    document.getElementById('lb-frame').style.display = 'none';
    document.getElementById('lb-offline').className   = 'show';
  }
}

async function api(url) {
  try { await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }); }
  catch (_) {}
}

async function saveConfig() {
  const body = {
    host:      document.getElementById('cfg-host').value.trim(),
    http_port: parseInt(document.getElementById('cfg-http').value) || 8080,
    grpc_port: parseInt(document.getElementById('cfg-grpc').value) || 8003,
  };
  try { await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); }
  catch (_) {}
}

async function pollStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());

    const srvBadge = document.getElementById('srv-badge');
    const bSS = document.getElementById('btn-srv-start');
    const bST = document.getElementById('btn-srv-stop');
    if (d.server_running) {
      srvBadge.textContent = 'Server: Running'; srvBadge.className = 'badge running';
      bSS.disabled = true;
      bST.disabled = false; bST.className = 'btn';
    } else {
      srvBadge.textContent = 'Server: Stopped'; srvBadge.className = 'badge stopped';
      bSS.disabled = false;
      bST.disabled = true;  bST.className = 'btn btn-ghost';
    }

    const lbBadge  = document.getElementById('lb-badge');
    const bLS  = document.getElementById('btn-lb-start');
    const bLT  = document.getElementById('btn-lb-stop');
    const wasRunning = lbRunning;
    lbRunning = d.lb_running;

    if (lbRunning) {
      lbBadge.textContent = 'LB: Running'; lbBadge.className = 'badge running';
      bLS.disabled = true;  bLS.className = 'btn btn-ghost';
      bLT.disabled = false; bLT.className = 'btn';
      if (!wasRunning && activeTab === 'lb') {
        const f = document.getElementById('lb-frame');
        f.src = `http://127.0.0.1:${LB}${activeLBPath}`;
        f.style.display = 'block';
        document.getElementById('lb-offline').className = '';
      }
    } else {
      lbBadge.textContent = 'LB: Offline'; lbBadge.className = 'badge stopped';
      bLS.disabled = false; bLS.className = 'btn';
      bLT.disabled = true;  bLT.className = 'btn btn-ghost';
      if (wasRunning && activeTab === 'lb') {
        const f = document.getElementById('lb-frame');
        f.style.display = 'none';
        f.src = '';
        document.getElementById('lb-offline').className = 'show';
      }
    }

    if (!cfgLoaded) {
      document.getElementById('cfg-host').value = d.host;
      document.getElementById('cfg-http').value = d.http_port;
      document.getElementById('cfg-grpc').value = d.grpc_port;
      cfgLoaded = true;
    }
  } catch (_) {}
}

async function pollLogs(type) {
  const idx = type === 'server' ? srvIdx : lbIdx;
  try {
    const d = await fetch(`/api/logs/${type}?since=${idx}`).then(r => r.json());
    if (d.lines && d.lines.length) {
      const box = document.getElementById(`log-${type}`);
      const atBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 20;
      for (const line of d.lines) {
        const el = document.createElement('div');
        el.textContent = line;
        box.appendChild(el);
      }
      if (atBottom) box.scrollTop = box.scrollHeight;
    }
    if (type === 'server') srvIdx = d.total;
    else lbIdx = d.total;
  } catch (_) {}
}

async function clearLog(type) {
  document.getElementById(`log-${type}`).innerHTML = '';
  try {
    const d = await fetch(`/api/logs/${type}?since=0`).then(r => r.json());
    if (type === 'server') srvIdx = d.total;
    else lbIdx = d.total;
  } catch (_) {}
}

pollStatus();
setInterval(pollStatus,               1500);
setInterval(() => pollLogs('server'),  900);
setInterval(() => pollLogs('lb'),      900);
</script>
</body>
</html>
